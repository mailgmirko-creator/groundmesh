<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GroundMesh Resource Viewer</title>
  <meta name="theme-color" content="#1f5c46" />
  <link rel="icon" href="./assets/gm-app-icon.svg" type="image/svg+xml" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <script src="./assets/pwa-init.js" defer></script>
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #151c26;
      --panel-2: #1b2431;
      --text: #eef2f7;
      --muted: #b8c2cf;
      --line: rgba(255,255,255,.08);
      --accent: #95e3ae;
      --accent-2: #8bc4ff;
      --shadow: 0 18px 40px rgba(0,0,0,.24);
      --radius: 24px;
      --max: 980px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      font-family: "Segoe UI", Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(139,196,255,.10), transparent 28%),
        linear-gradient(180deg, #0a0e13 0%, #0f141b 100%);
    }
    .wrap {
      width: min(calc(100% - 32px), var(--max));
      margin: 0 auto;
      padding: 28px 0 92px;
    }
    .hero, .card {
      background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .hero {
      padding: 28px;
      margin-bottom: 18px;
    }
    .eyebrow {
      text-transform: uppercase;
      letter-spacing: .2em;
      color: var(--accent);
      font-size: .75rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    h1 {
      margin: 0 0 12px;
      line-height: 1.08;
      font-size: clamp(1.8rem, 4vw, 3rem);
    }
    p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.6;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 16px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-weight: 700;
      text-decoration: none;
      color: inherit;
    }
    .btn.primary {
      background: var(--accent);
      color: #09100c;
    }
    .btn.secondary {
      background: transparent;
      border-color: var(--line);
    }
    .card {
      padding: 18px;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: .85rem;
      font-weight: 600;
    }
    pre {
      margin: 0;
      padding: 18px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      border-radius: 18px;
      background: rgba(0,0,0,.24);
      border: 1px solid var(--line);
      color: var(--text);
      font: .95rem/1.55 Consolas, "Courier New", monospace;
    }
    @media (max-width: 640px) {
      .wrap { width: min(calc(100% - 24px), var(--max)); padding-bottom: 86px; }
      .hero { padding: 22px; }
      .card { padding: 14px; }
      pre { padding: 14px; font-size: .88rem; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="eyebrow">GroundMesh resource viewer</div>
      <h1 id="resource-title">Loading resource...</h1>
      <p id="resource-copy">Raw project files now open inside the app shell, so you can still use the smaller Back and Home controls instead of getting stuck at a dead end.</p>
      <div class="actions">
        <a id="raw-link" class="btn primary" href="atlas/index.html" data-bypass-resource-viewer="true" target="_blank" rel="noopener">Open Raw File</a>
        <a class="btn secondary" href="atlas/index.html">Open Atlas</a>
      </div>
    </section>

    <section class="card">
      <div class="meta">
        <span class="chip" id="resource-kind">Type: -</span>
        <span class="chip" id="resource-path">Path: -</span>
      </div>
      <pre id="resource-content">Loading...</pre>
    </section>
  </main>

  <script>
    (function () {
      const rootUrl = new URL("./", window.location.href);
      const rootPath = rootUrl.pathname.endsWith("/") ? rootUrl.pathname : `${rootUrl.pathname}/`;
      const allowedPattern = /\.(md|json|txt)$/i;
      const params = new URLSearchParams(window.location.search);
      const rawPath = params.get("path") || "";

      const title = document.getElementById("resource-title");
      const copy = document.getElementById("resource-copy");
      const kind = document.getElementById("resource-kind");
      const path = document.getElementById("resource-path");
      const content = document.getElementById("resource-content");
      const rawLink = document.getElementById("raw-link");

      const setState = ({ heading, description, type, displayPath, body, rawHref }) => {
        document.title = heading ? `${heading} - GroundMesh` : "GroundMesh Resource Viewer";
        title.textContent = heading || "GroundMesh resource";
        copy.textContent = description;
        kind.textContent = `Type: ${type || "unknown"}`;
        path.textContent = `Path: ${displayPath || "unknown"}`;
        content.textContent = body;

        if (rawHref) {
          rawLink.href = rawHref;
          rawLink.removeAttribute("aria-disabled");
        } else {
          rawLink.href = "atlas/index.html";
          rawLink.setAttribute("aria-disabled", "true");
        }
      };

      if (!rawPath) {
        setState({
          heading: "No resource selected",
          description: "Open a document or data link from the site and it will stay inside this viewer.",
          type: "viewer",
          displayPath: "none",
          body: "No resource path was provided.",
          rawHref: null
        });
        return;
      }

      let resourceUrl;
      try {
        resourceUrl = new URL(rawPath, rootUrl);
      } catch {
        setState({
          heading: "Invalid resource path",
          description: "The requested file path could not be resolved.",
          type: "invalid",
          displayPath: rawPath,
          body: `Could not resolve: ${rawPath}`,
          rawHref: null
        });
        return;
      }

      const withinDocs = resourceUrl.origin === window.location.origin &&
        resourceUrl.pathname.startsWith(rootPath);

      if (!withinDocs || !allowedPattern.test(resourceUrl.pathname)) {
        setState({
          heading: "Blocked resource path",
          description: "Only local GroundMesh markdown, JSON, and text files are shown here.",
          type: "blocked",
          displayPath: rawPath,
          body: `Blocked path: ${rawPath}`,
          rawHref: null
        });
        return;
      }

      const relativePath = decodeURIComponent(resourceUrl.pathname.slice(rootPath.length).replace(/^\/+/, ""));
      const extension = (resourceUrl.pathname.match(/\.([^.]+)$/) || [null, "txt"])[1].toLowerCase();

      setState({
        heading: relativePath,
        description: "This file is being shown inside the app shell so Back and Home still work.",
        type: extension,
        displayPath: relativePath,
        body: "Loading...",
        rawHref: resourceUrl.href
      });

      fetch(resourceUrl.href, { cache: "no-store" })
        .then((response) => {
          if (!response.ok) {
            throw new Error(`Request failed with ${response.status}`);
          }
          return response.text();
        })
        .then((text) => {
          const formatted = extension === "json"
            ? JSON.stringify(JSON.parse(text), null, 2)
            : text;

          content.textContent = formatted;
        })
        .catch((error) => {
          setState({
            heading: relativePath,
            description: "The file could not be loaded inside the viewer.",
            type: extension,
            displayPath: relativePath,
            body: `Failed to load ${relativePath}\n\n${error.message}`,
            rawHref: resourceUrl.href
          });
        });
    }());
  </script>
</body>
</html>
