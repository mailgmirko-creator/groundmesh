name: repo-health

on:
  push:
    branches: [ dev, main, master ]
  pull_request:
    branches: [ dev, main, master ]

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON
        run: |
          python - << 'PY'
          import sys, json, pathlib
          bad = []
          for p in pathlib.Path('.').rglob('*.json'):
              try:
                  json.loads(p.read_text(encoding='utf-8'))
              except Exception as e:
                  bad.append((str(p), str(e)))
          for p in pathlib.Path('.').rglob('*.webmanifest'):
              try:
                  json.loads(p.read_text(encoding='utf-8'))
              except Exception as e:
                  bad.append((str(p), str(e)))
          for p in pathlib.Path('.').rglob('*.schema.json'):
              try:
                  json.loads(p.read_text(encoding='utf-8'))
              except Exception as e:
                  bad.append((str(p), str(e)))
          if bad:
              print("JSON validation errors:")
              for f, err in bad:
                  print(f"- {f}: {err}")
              sys.exit(1)
          print("JSON OK")
          PY

      - name: Validate Behavior Atlas schema sandbox
        shell: pwsh
        run: |
          ./scripts/behavior-atlas-validate.ps1 -RequireSynthetic

      - name: Check links with lychee
        uses: lycheeverse/lychee-action@v1
        with:
          args: --no-progress --accept 200,206 --max-concurrency 8 --timeout 20s --retry-wait-time 2 --exclude-mail --verbose README.md docs/**/*.html docs/**/*.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Confirm Atlas index exists
        run: |
          test -f docs/atlas/index.html && echo "Atlas present" || (echo "Missing docs/atlas/index.html" && exit 1)
