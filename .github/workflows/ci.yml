name: GroundMesh CI
run-name: "GroundMesh CI • ${{ github.ref_name }}"

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify repository structure
        run: |
          test -f README.md
          test -d docs
          test -d scripts
          test -f docs/index.html
          test -f docs/contribute.html
          test -f docs/map.html
          test -f docs/manifest.webmanifest
          test -f docs/assets/pwa-init.js
          test -f docs/assets/gm-app-icon.svg
          test -f docs/data/public-node-inbox.json
          test -f docs/data/public-node-outbox.json
          test -f docs/data/public-node-claims.json
          test -f docs/data/public-node-acks.json
          test -f docs/atlas/registry.json
          test -f scripts/health-check.ps1
